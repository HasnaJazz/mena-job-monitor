name: Daily Job Monitor

on:
  schedule:
    - cron: '0 9 * * *'
  workflow_dispatch:

jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run job monitor
        run: python job_monitor.py

      - name: Upload results
        uses: actions/upload-artifact@v4
        with:
          name: job-results
          path: |
            results/
            job_history.json
          retention-days: 30
